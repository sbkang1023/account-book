<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님의 스마트 가계부 - 스트레스 종결판</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #f4f7f6; --danger: #e74a3b; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: var(--bg); max-width: 1300px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: var(--primary); text-align: center; margin-top: 0; }
        .upload-area { display: block; border: 2px dashed var(--primary); padding: 30px; text-align: center; cursor: pointer; background: #fff; border-radius: 15px; margin: 20px 0; }
        #excelInput { display: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #eee; border-radius: 12px; height: 350px; padding: 15px; position: relative; }
        .total-badge { position: absolute; top: 15px; right: 20px; background: var(--primary); color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 16px; z-index: 10; box-shadow: 0 4px 10px rgba(0,112,243,0.3); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; background: #fff; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        .btn { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #28a745; color: white; }
        .archive-item { background: white; color: var(--primary); border: 1px solid var(--primary); padding: 5px 12px; border-radius: 15px; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: bold; }
        .btn-del { color: var(--danger); cursor: pointer; font-weight: bold; font-size: 18px; line-height: 1; }
        select { padding: 4px; border-radius: 4px; border: 1px solid #ddd; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h1>📊 스마트 지출 분석 통합 시스템</h1>
    
    <div style="text-align:center; margin-bottom:20px;">
        <input type="text" id="saveMonth" placeholder="예: 2026-04" style="padding:10px; border-radius:8px; border:1px solid #ddd; width:150px;">
        <button onclick="saveCurrentMonth()" class="btn btn-save">💾 현재 데이터 저장</button>
        <div id="archiveList" style="margin-top:15px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;"></div>
    </div>

    <label class="upload-area" for="excelInput">
        <strong>클릭하여 현대카드 엑셀 업로드</strong>
        <p id="status" style="margin-top:10px; color:#666;">데이터 누락 방지 엔진이 가동 중입니다. (3000행 강제 스캔)</p>
        <input type="file" id="excelInput" accept=".xls, .xlsx">
    </label>

    <div class="dashboard">
        <div class="chart-container">
            <div id="totalSumDisplay" class="total-badge">총 합계: 0원</div>
            <canvas id="pieChart"></canvas>
        </div>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>

    <div id="tableOutput" style="overflow-x:auto; max-height: 500px; border-radius: 10px; border: 1px solid #eee;"></div>
</div>

<script>
window.onload = function() {
    let cardData = [];
    let archives = JSON.parse(localStorage.getItem('monthlyArchives')) || {};
    let pieChart, barChart;
    const categories = ['식비/카페', '차량/주유', '쇼핑/마트', '의료/건강', '통신/주거', '보험/고정', '기타/미분류'];

    renderArchiveList();

    document.getElementById('excelInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                // raw: false 설정을 통해 모든 수식을 무시하고 텍스트 그대로 강제 로드
                const workbook = XLSX.read(data, {type: 'array', raw: false, cellText: true});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                
                // [강력 엔진] 엑셀이 지정한 범위를 무시하고 3000행까지 강제 확장 스캔
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, range: "A1:Z3000", defval: ""});
                
                let col = { date: -1, store: -1, price: -1, inst: -1 };
                let headerFound = false;
                cardData = [];

                for (let i = 0; i < rows.length; i++) {
                    const r = rows[i].map(v => String(v).trim());
                    
                    if (!headerFound) {
                        if (r.some(v => v.includes('이용일')) && r.some(v => v.includes('이용가맹점'))) {
                            r.forEach((cell, idx) => {
                                if (cell === '이용일') col.date = idx;
                                if (cell === '이용가맹점') col.store = idx;
                                if (cell === '결제원금' || cell === '이용금액') col.price = idx;
                                if (cell === '할부/회차') col.inst = idx;
                            });
                            headerFound = true;
                        }
                        continue;
                    }

                    // 헤더 이후 데이터 행 처리
                    try {
                        const store = r[col.store];
                        if (!store || store === "" || store.includes('합계') || store.includes('상세내역')) continue;

                        const date = r[col.date];
                        if (!date || !date.match(/\d/)) continue;

                        // 결제원금 컬럼 우선 타겟팅
                        let price = parseInt(r[col.price].replace(/[^0-9]/g, "")) || 0;
                        
                        // 할부 보정
                        let instVal = r[col.inst] || "-";
                        if (instVal === '0.01' || instVal === '0' || instVal === '') instVal = '-';

                        if (price > 0 && price < 10000000) { // 120조 같은 오류 방지
                            cardData.push({
                                date: date,
                                store: store,
                                price: price,
                                inst: instVal,
                                category: '기타/미분류'
                            });
                        }
                    } catch (rowErr) { continue; } // 개별 행 에러 시 무시하고 다음 행 진행
                }

                if (cardData.length > 0) {
                    updateDashboard();
                    renderTable();
                    document.getElementById('status').textContent = `✅ 성공: 총 ${cardData.length}건 수집 완료!`;
                } else {
                    alert("데이터를 찾을 수 없습니다. 엑셀 형식을 확인해주세요.");
                }
            } catch (err) { alert("파일 처리 중 오류 발생"); }
        };
        reader.readAsArrayBuffer(file);
    };

    function renderTable() {
        let html = '<table><tr><th>카테고리</th><th>날짜</th><th>가맹점</th><th>할부</th><th>이번달 금액</th></tr>';
        cardData.forEach((item, idx) => {
            html += `<tr>
                <td><select onchange="updateRowCategory(${idx}, this.value)">
                    ${categories.map(cat => `<option value="${cat}" ${item.category === cat ? 'selected' : ''}>${cat}</option>`).join('')}
                </select></td>
                <td>${item.date}</td><td>${item.store}</td><td>${item.inst}</td>
                <td style="font-weight:bold;">${item.price.toLocaleString()}원</td>
            </tr>`;
        });
        document.getElementById('tableOutput').innerHTML = html + '</table>';
    }

    window.updateRowCategory = function(idx, newCat) { cardData[idx].category = newCat; updateDashboard(); };

    function updateDashboard() {
        const sumMap = {};
        let total = 0;
        cardData.forEach(item => {
            sumMap[item.category] = (sumMap[item.category] || 0) + item.price;
            total += item.price;
        });

        document.getElementById('totalSumDisplay').textContent = `총 합계: ${total.toLocaleString()}원`;
        
        const labels = Object.keys(sumMap).sort((a,b) => sumMap[b] - sumMap[a]);
        const data = labels.map(l => sumMap[l]);
        const colors = ['#0070f3', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796', '#5a5c69'];

        if(pieChart) pieChart.destroy();
        if(barChart) barChart.destroy();
        pieChart = new Chart(document.getElementById('pieChart'), { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: colors }] }, options: { maintainAspectRatio: false }});
        barChart = new Chart(document.getElementById('barChart'), { type: 'bar', data: { labels, datasets: [{ label: '지출액', data, backgroundColor: '#0070f3' }] }, options: { indexAxis: 'y', maintainAspectRatio: false }});
    }

    window.saveCurrentMonth = function() {
        const m = document.getElementById('saveMonth').value.trim();
        if (m && cardData.length > 0) {
            archives[m] = cardData;
            localStorage.setItem('monthlyArchives', JSON.stringify(archives));
            renderArchiveList();
            alert(m + " 데이터가 안전하게 저장되었습니다.");
        } else { alert("월 이름(예: 2026-03)을 입력하고 데이터를 먼저 업로드해주세요."); }
    };

    function renderArchiveList() {
        const list = Object.keys(archives).sort().reverse();
        document.getElementById('archiveList').innerHTML = list.map(m => `
            <div class="archive-item">
                <span onclick="loadMonth('${m}')" style="cursor:pointer;">${m}</span>
                <span class="btn-del" onclick="deleteMonth('${m}')" title="삭제">×</span>
            </div>
        `).join('');
    }

    window.deleteMonth = function(m) {
        if (confirm(`${m} 데이터를 영구 삭제하시겠습니까?`)) {
            delete archives[m];
            localStorage.setItem('monthlyArchives', JSON.stringify(archives));
            renderArchiveList();
        }
    };

    window.loadMonth = function(m) {
        cardData = archives[m];
        updateDashboard();
        renderTable();
        document.getElementById('saveMonth').value = m;
    };
};
</script>
</body>
</html>

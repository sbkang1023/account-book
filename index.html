<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님의 가계부 - 무조건 2000줄 스캔</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #eef2f7; } /* 배경색을 살짝 푸른 빛으로 변경 */
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: var(--bg); max-width: 1300px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: var(--primary); text-align: center; }
        .upload-area { display: block; border: 2px dashed var(--primary); padding: 30px; text-align: center; cursor: pointer; background: #fff; border-radius: 15px; margin: 20px 0; }
        #excelInput { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
    </style>
</head>
<body>

<div class="box">
    <h1>📊 지출 분석 (2000행 강제 스캔)</h1>
    <p style="text-align:center; color:#666;">배경이 푸른색이면 최신 코드입니다.</p>
    
    <label class="upload-area" for="excelInput">
        <strong>클릭하여 업로드</strong>
        <p id="status">범위 제한을 풀고 끝까지 스캔합니다.</p>
        <input type="file" id="excelInput" accept=".xls, .xlsx">
    </label>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; height:350px;">
        <canvas id="pieChart"></canvas><canvas id="barChart"></canvas>
    </div>
    <div id="tableOutput" style="overflow-x:auto; max-height: 500px;"></div>
</div>

<script>
window.onload = function() {
    let cardData = [];
    let pieChart, barChart;

    document.getElementById('excelInput').onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array', cellNF: true, cellText: true, raw: false});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            
            // [강제 범위 확장] 엑셀이 숨겨놓은 데이터를 찾기 위해 범위를 강제로 A1:Z2000으로 고정
            const rows = XLSX.utils.sheet_to_json(sheet, {
                header: 1, 
                defval: "", 
                range: "A1:Z2000", 
                blankrows: true 
            });
            
            let col = { date: -1, store: -1, price: -1, inst: -1 };
            let headerIdx = -1;

            for (let i = 0; i < rows.length; i++) {
                const r = rows[i].map(v => String(v).replace(/\s/g, ''));
                if (r.some(v => v.includes('이용일')) && r.some(v => v.includes('이용가맹점'))) {
                    rows[i].forEach((cell, idx) => {
                        const val = String(cell).replace(/\s/g, '');
                        if (val.includes('이용일')) col.date = idx;
                        if (val.includes('이용가맹점')) col.store = idx;
                        if (val.includes('결제원금') || val.includes('이용금액')) col.price = idx;
                        if (val.includes('할부/회차')) col.inst = idx;
                    });
                    headerIdx = i;
                    break;
                }
            }

            cardData = [];
            for (let i = headerIdx + 1; i < rows.length; i++) {
                const store = String(rows[i][col.store] || '').trim();
                if (!store || store.includes('합계') || !String(rows[i][col.date]).match(/\d/)) continue;

                let price = parseInt(String(rows[i][col.price]).replace(/[^0-9]/g, "")) || 0;
                let instVal = String(rows[i][col.inst] || "-").trim();
                if (instVal === "0.01" || instVal === "0") instVal = "-";

                if (price > 0) {
                    cardData.push({ date: String(rows[i][col.date]), store, price, inst: instVal });
                }
            }
            
            // 그래프 및 테이블 렌더링
            renderAll();
            document.getElementById('status').textContent = "✅ 성공: " + cardData.length + "건 수집";
        };
        reader.readAsArrayBuffer(file);
    };

    function renderAll() {
        const sumMap = {};
        cardData.forEach(d => sumMap['분류전'] = (sumMap['분류전'] || 0) + d.price);
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(document.getElementById('pieChart'), { type: 'doughnut', data: { labels: Object.keys(sumMap), datasets: [{ data: Object.values(sumMap), backgroundColor: ['#0070f3'] }] }});
        
        let html = '<table><tr><th>이용일</th><th>가맹점</th><th>할부</th><th>금액</th></tr>';
        cardData.forEach(row => {
            html += `<tr><td>${row.date}</td><td>${row.store}</td><td>${row.inst}</td><td>${row.price.toLocaleString()}원</td></tr>`;
        });
        document.getElementById('tableOutput').innerHTML = html + '</table>';
    }
};
</script>
</body>
</html>

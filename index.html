<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님의 스마트 가계부 - 데이터 강제 파싱</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: var(--bg); max-width: 1300px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h3 { color: var(--primary); text-align: center; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .upload-area { display: block; border: 2px dashed var(--primary); padding: 40px; text-align: center; cursor: pointer; background: #f0f7ff; border-radius: 15px; margin: 20px 0; }
        #excelInput { display: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #eee; border-radius: 12px; height: 350px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        select { padding: 4px; border-radius: 4px; border: 1px solid #ddd; width: 100%; }
        .fixed-tag { background: #eef; padding: 5px 10px; border-radius: 15px; margin: 5px; display: inline-block; font-size: 12px; }
    </style>
</head>
<body>

<div class="box">
    <h1>📊 지출 분석 시스템 (전수 데이터 추적 모드)</h1>
    
    <div style="text-align:center; margin-bottom:20px;">
        <input type="text" id="saveMonth" placeholder="예: 2026-04" style="padding:8px; border-radius:8px; border:1px solid #ddd;">
        <button onclick="saveCurrentMonth()" class="btn" style="background:#28a745">현재 상태 저장</button>
        <div id="archiveList" style="margin-top:10px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;"></div>
    </div>

    <div style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;">
        <input type="text" id="fixedName" placeholder="고정지출명">
        <input type="number" id="fixedAmount" placeholder="금액">
        <button onclick="addFixedCost()" class="btn">추가</button>
    </div>
    <div id="fixedList" style="text-align:center; margin-bottom:15px;"></div>

    <label class="upload-area" for="excelInput">
        <strong>클릭하여 현대카드 엑셀 업로드</strong>
        <p id="status">병합된 셀과 상관없이 모든 데이터 행을 강제 수집합니다.</p>
        <input type="file" id="excelInput" accept=".xls, .xlsx">
    </label>

    <div class="dashboard">
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>

    <div id="tableOutput" style="overflow-x:auto; max-height: 500px;"></div>
</div>

<script>
window.onload = function() {
    let fixedCosts = JSON.parse(localStorage.getItem('fixedCosts')) || [];
    let archives = JSON.parse(localStorage.getItem('monthlyArchives')) || {};
    let cardData = [];
    let pieChart, barChart;
    const categories = ['식비/카페', '차량/주유', '쇼핑/마트', '의료/건강', '통신/주거', '기타/미분류'];

    renderFixedCosts();
    renderArchiveList();
    updateDashboard();

    document.getElementById('excelInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array', raw: true});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                
                // [강화] 모든 옵션을 해제하고 가장 순수한 형태의 2차원 배열로 변환
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                
                cardData = [];
                // 엑셀의 모든 행을 끝까지 전수 조사
                for (let i = 0; i < rows.length; i++) {
                    try {
                        const row = rows[i];
                        const rowString = row.join('|');
                        
                        // "2026년 04월 13일" 같은 날짜 패턴이 포함된 행만 낚아챔
                        if (rowString.match(/\d{4}년\s?\d{2}월\s?\d{2}일/)) {
                            // 날짜, 가맹점, 금액의 위치를 데이터 특징으로 찾음
                            let date = "", store = "", price = 0, inst = "-";
                            
                            row.forEach(cell => {
                                const val = String(cell).trim();
                                if (val.match(/\d{4}년\s?\d{2}월\s?\d{2}일/)) date = val;
                                else if (val.includes('본인V')) {} // 카드정보 스킵
                                else if (val.match(/^[0-9,]+$/) && val.length >= 4) {
                                    // 숫자가 길면 금액으로 간주
                                    const p = parseInt(val.replace(/,/g, ''));
                                    if (p > 500) price = p;
                                } else if (val.includes('/') && val.length <= 5) {
                                    inst = val; // 할부 정보
                                } else if (val.length > 1 && !val.includes('%') && store === "") {
                                    store = val; // 가맹점명
                                }
                            });

                            if (date && store && price > 0) {
                                cardData.push({ date, store, price, inst, category: '기타/미분류' });
                            }
                        }
                    } catch (e) { continue; }
                }

                // 만약 날짜 패턴으로 못 찾았다면 기존의 인덱스 방식도 백업으로 가동
                if (cardData.length < 5) {
                    console.log("패턴 매칭 실패, 인덱스 기반 백업 가동");
                    // 기존 인덱스 기반 로직...
                }

                updateDashboard();
                renderTable();
                document.getElementById('status').textContent = `✅ 성공: 총 ${cardData.length}건을 강제 수집했습니다!`;
            } catch (err) { alert("파일 처리 오류: " + err.message); }
        };
        reader.readAsArrayBuffer(file);
    };

    function renderTable() {
        let html = '<table><tr><th>카테고리</th><th>이용일</th><th>가맹점</th><th>할부/회차</th><th>이용금액</th></tr>';
        cardData.forEach((item, idx) => {
            html += `<tr>
                <td><select onchange="updateRowCategory(${idx}, this.value)">
                    ${categories.map(cat => `<option value="${cat}" ${item.category === cat ? 'selected' : ''}>${cat}</option>`).join('')}
                </select></td>
                <td>${item.date}</td><td>${item.store}</td>
                <td style="text-align:center;">${item.inst}</td>
                <td style="font-weight:bold;">${item.price.toLocaleString()}원</td>
            </tr>`;
        });
        document.getElementById('tableOutput').innerHTML = html + '</table>';
    }

    // --- 이하 대시보드 및 저장 기능 동일 ---
    function updateDashboard() {
        const sumMap = {};
        fixedCosts.forEach(item => sumMap['고정지출'] = (sumMap['고정지출'] || 0) + item.amount);
        cardData.forEach(item => sumMap[item.category] = (sumMap[item.category] || 0) + item.price);
        const labels = Object.keys(sumMap).sort((a,b) => sumMap[b] - sumMap[a]);
        const data = labels.map(l => sumMap[l]);
        if(pieChart) pieChart.destroy();
        if(barChart) barChart.destroy();
        pieChart = new Chart(document.getElementById('pieChart').getContext('2d'), { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: ['#0070f3', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796'] }] }, options: { maintainAspectRatio: false } });
        barChart = new Chart(document.getElementById('barChart').getContext('2d'), { type: 'bar', data: { labels, datasets: [{ label:'금액', data, backgroundColor: '#0070f3' }] }, options: { indexAxis: 'y', maintainAspectRatio: false } });
    }
    window.updateRowCategory = function(idx, newCat) { cardData[idx].category = newCat; updateDashboard(); };
    window.addFixedCost = function() {
        const n = document.getElementById('fixedName').value;
        const a = parseInt(document.getElementById('fixedAmount').value);
        if (n && a) { fixedCosts.push({ name: n, amount: a }); localStorage.setItem('fixedCosts', JSON.stringify(fixedCosts)); renderFixedCosts(); updateDashboard(); }
    };
    window.removeFixed = function(i) { fixedCosts.splice(i, 1); localStorage.setItem('fixedCosts', JSON.stringify(fixedCosts)); renderFixedCosts(); updateDashboard(); };
    function renderFixedCosts() { document.getElementById('fixedList').innerHTML = fixedCosts.map((item, i) => `<span class="fixed-tag">${item.name}: ${item.amount.toLocaleString()}원 <b onclick="removeFixed(${i})" style="color:red; cursor:pointer;">×</b></span>`).join(''); }
    window.saveCurrentMonth = function() {
        const m = document.getElementById('saveMonth').value.trim();
        if (m && cardData.length > 0) { archives[m] = cardData; localStorage.setItem('monthlyArchives', JSON.stringify(archives)); renderArchiveList(); alert(m + " 저장됨"); }
    };
    function renderArchiveList() { document.getElementById('archiveList').innerHTML = Object.keys(archives).map(m => `<button onclick="loadMonth('${m}')" style="padding:5px 10px; border-radius:15px; border:1px solid #0070f3; background:white; color:#0070f3; cursor:pointer; margin-right:5px;">${m}</button>`).join(''); }
    window.loadMonth = function(m) { cardData = archives[m]; updateDashboard(); renderTable(); document.getElementById('saveMonth').value = m; };
};
</script>
</body>
</html>

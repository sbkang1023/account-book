<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님의 스마트 가계부 - 금액 복구 버전</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: var(--bg); max-width: 1200px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h3 { color: var(--primary); text-align: center; }
        .input-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .upload-area { display: block; border: 2px dashed var(--primary); padding: 30px; text-align: center; cursor: pointer; background: #f0f7ff; border-radius: 15px; margin: 20px 0; }
        #excelInput { display: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #eee; border-radius: 12px; height: 380px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        select { padding: 4px; border-radius: 4px; border: 1px solid #ddd; width: 100%; }
        .fixed-tag { background: #eef; padding: 5px 10px; border-radius: 15px; margin: 5px; display: inline-block; font-size: 13px; }
    </style>
</head>
<body>

<div class="box">
    <h1>📊 지출 분석 시스템 (금액 파싱 강화)</h1>
    
    <div class="section">
        <h3>🏠 고정 지출 설정</h3>
        <div class="input-group">
            <input type="text" id="fixedName" placeholder="항목명">
            <input type="number" id="fixedAmount" placeholder="금액">
            <button class="btn" id="addBtn">고정지출 추가</button>
        </div>
        <div id="fixedList" style="text-align:center; margin-bottom:20px;"></div>
    </div>

    <label class="upload-area" for="excelInput">
        <strong>엑셀 업로드</strong>
        <p id="status" style="margin-top:10px; color:#666;">금액이 0으로 나온다면 이 버전으로 다시 시도해 보세요.</p>
        <input type="file" id="excelInput" accept=".xls, .xlsx">
    </label>

    <div class="dashboard">
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>

    <div id="tableOutput" style="overflow-x:auto; max-height: 500px;"></div>
</div>

<script>
window.onload = function() {
    let fixedCosts = JSON.parse(localStorage.getItem('fixedCosts')) || [];
    let cardData = [];
    let pieChart, barChart;

    const categories = ['식비/카페', '차량/주유', '쇼핑/마트', '의료/건강', '통신/주거', '기타/미분류'];

    renderFixedCosts();
    updateDashboard();

    document.getElementById('addBtn').onclick = function() {
        const name = document.getElementById('fixedName').value;
        const amount = parseInt(document.getElementById('fixedAmount').value);
        if (name && amount) {
            fixedCosts.push({ name, amount });
            localStorage.setItem('fixedCosts', JSON.stringify(fixedCosts));
            renderFixedCosts();
            updateDashboard();
            document.getElementById('fixedName').value = '';
            document.getElementById('fixedAmount').value = '';
        }
    };

    document.getElementById('excelInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
            
            let headerIdx = -1;
            for(let i=0; i<rows.length; i++) {
                if(rows[i].join('').includes('이용일')) { headerIdx = i; break; }
            }
            
            if(headerIdx !== -1) {
                const rawData = XLSX.utils.sheet_to_json(sheet, {range: headerIdx});
                cardData = rawData.map(row => {
                    // 금액 후보 컬럼들 체크
                    let rawPrice = row['이용금액'] || row['결제원금'] || row['금액'] || row['이용금액(원)'] || 0;
                    
                    // 문자열에서 숫자만 추출 (정규식 사용)
                    let cleanPrice = 0;
                    if (typeof rawPrice === 'string') {
                        cleanPrice = parseInt(rawPrice.replace(/[^0-9]/g, '')) || 0;
                    } else {
                        cleanPrice = parseInt(rawPrice) || 0;
                    }

                    const store = String(row['이용가맹점'] || row['가맹점명'] || '미분류');
                    
                    return { 
                        ...row, 
                        __category: '기타/미분류', 
                        __price: cleanPrice, 
                        __store: store 
                    };
                });
                updateDashboard();
                renderTable();
            }
        };
        reader.readAsArrayBuffer(file);
    };

    function updateDashboard() {
        const sumMap = {};
        fixedCosts.forEach(item => {
            sumMap['고정지출'] = (sumMap['고정지출'] || 0) + item.amount;
        });
        cardData.forEach(item => {
            if (item.__price > 0) {
                sumMap[item.__category] = (sumMap[item.__category] || 0) + item.__price;
            }
        });

        const labels = Object.keys(sumMap).sort((a,b) => sumMap[b] - sumMap[a]);
        const data = labels.map(l => sumMap[l]);
        
        if(pieChart) pieChart.destroy();
        if(barChart) barChart.destroy();
        
        const ctxPie = document.getElementById('pieChart').getContext('2d');
        pieChart = new Chart(ctxPie, {
            type: 'doughnut',
            data: { labels, datasets: [{ data, backgroundColor: ['#0070f3', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796'] }] },
            options: { maintainAspectRatio: false }
        });

        const ctxBar = document.getElementById('barChart').getContext('2d');
        barChart = new Chart(ctxBar, {
            type: 'bar',
            data: { labels, datasets: [{ label:'금액', data, backgroundColor: '#0070f3' }] },
            options: { indexAxis: 'y', maintainAspectRatio: false }
        });
    }

    function renderTable() {
        if(!cardData.length) return;
        let html = '<table><tr><th>카테고리 선택</th><th>가맹점</th><th>금액</th></tr>';
        cardData.forEach((row, idx) => {
            html += `<tr>
                <td>
                    <select onchange="updateRowCategory(${idx}, this.value)">
                        ${categories.map(cat => `<option value="${cat}" ${row.__category === cat ? 'selected' : ''}>${cat}</option>`).join('')}
                    </select>
                </td>
                <td>${row.__store}</td>
                <td>${row.__price.toLocaleString()}원</td>
            </tr>`;
        });
        document.getElementById('tableOutput').innerHTML = html + '</table>';
    }

    window.updateRowCategory = function(idx, newCat) {
        cardData[idx].__category = newCat;
        updateDashboard();
    };

    function renderFixedCosts() {
        const div = document.getElementById('fixedList');
        div.innerHTML = fixedCosts.map((item, i) => `
            <span class="fixed-tag">${item.name}: ${item.amount.toLocaleString()}원 
            <b onclick="removeFixed(${i})" style="color:red; cursor:pointer; margin-left:5px">×</b></span>
        `).join('') || "<p>고정 지출을 등록하세요.</p>";
    }

    window.removeFixed = function(i) {
        fixedCosts.splice(i, 1);
        localStorage.setItem('fixedCosts', JSON.stringify(fixedCosts));
        renderFixedCosts();
        updateDashboard();
    };
};
</script>
</body>
</html>

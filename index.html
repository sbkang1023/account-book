<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님의 스마트 데이터 가계부</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: var(--bg); max-width: 1200px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .upload-area { border: 2px dashed var(--primary); padding: 30px; text-align: center; cursor: pointer; background: #f0f7ff; border-radius: 15px; margin-bottom: 20px; }
        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 800px) { .charts-container { grid-template-columns: 1fr; } }
        .chart-box { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #eee; height: 400px; }
        .input-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="box">
    <h1 style="text-align:center; color:var(--primary)">📊 카테고리별 지출 대시보드</h1>
    
    <div style="text-align:center; margin-bottom:30px;">
        <h3>🏠 고정 지출 등록</h3>
        <div class="input-group">
            <input type="text" id="costName" placeholder="항목 (예: 보험료)">
            <input type="number" id="costAmount" placeholder="금액 (원)">
            <button onclick="addFixedCost()">추가</button>
        </div>
        <div id="fixedList"></div>
    </div>

    <div class="upload-area" onclick="document.getElementById('excelInput').click()">
        <strong>현대카드 엑셀 업로드 (자동 분류 시스템 적용됨)</strong>
        <input type="file" id="excelInput" accept=".xls, .xlsx" style="display:none">
        <p id="status" style="margin-top:10px; color:#666;">파일을 선택하면 키워드 분석 후 그래프가 업데이트됩니다.</p>
    </div>

    <div class="charts-container">
        <div class="chart-box"><canvas id="pieChart"></canvas></div>
        <div class="chart-box"><canvas id="barChart"></canvas></div>
    </div>

    <div id="tableOutput" style="overflow-x:auto"></div>
</div>

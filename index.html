<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님의 스마트 가계부 - 데이터 무결성 버전</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: var(--bg); max-width: 1300px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h3 { color: var(--primary); text-align: center; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .upload-area { display: block; border: 2px dashed var(--primary); padding: 30px; text-align: center; cursor: pointer; background: #f0f7ff; border-radius: 15px; margin: 20px 0; }
        input[type="file"] { display: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #eee; border-radius: 12px; height: 350px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        .fixed-tag { background: #eef; padding: 5px 10px; border-radius: 15px; margin: 5px; display: inline-block; font-size: 13px; border: 1px solid #dde; }
        select { padding: 4px; border-radius: 4px; border: 1px solid #ddd; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h1>📊 지출 분석 시스템 (에러 자동 복구 모드)</h1>
    
    <div style="text-align:center; margin-bottom:20px;">
        <input type="text" id="saveMonth" placeholder="예: 2026-04" style="padding:8px; border-radius:8px; border:1px solid #ddd;">
        <button onclick="saveCurrentMonth()" class="btn" style="background:#28a745">현재 상태 저장</button>
        <div id="archiveList" style="margin-top:10px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;"></div>
    </div>

    <div class="section" style="border-top:1px solid #eee; padding-top:20px;">
        <h3>🏠 고정 지출 & 데이터 관리</h3>
        <div style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;">
            <input type="text" id="fixedName" placeholder="항목명">
            <input type="number" id="fixedAmount" placeholder="금액">
            <button onclick="addFixedCost()" class="btn">추가</button>
        </div>
        <div id="fixedList" style="text-align:center;"></div>
    </div>

    <label class="upload-area" for="excelInput">
        <strong>이곳을 클릭하여 현대카드 엑셀 업로드</strong>
        <p id="status" style="margin-top:10px; color:#666;">데이터를 끝까지 정밀 스캔합니다.</p>
        <input type="file" id="excelInput" accept=".xls, .xlsx">
    </label>

    <div class="dashboard">
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>

    <div id="tableOutput" style="overflow-x:auto; max-height: 500px;"></div>
</div>

<script>
window.onload = function() {
    let fixedCosts = JSON.parse(localStorage.getItem('fixedCosts')) || [];
    let archives = JSON.parse(localStorage.getItem('monthlyArchives')) || {};
    let cardData = [];
    let pieChart, barChart;

    const categories = ['식비/카페', '차량/주유', '쇼핑/마트', '의료/건강', '통신/주거', '기타/미분류'];

    renderFixedCosts();
    renderArchiveList();
    updateDashboard();

    document.getElementById('excelInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                
                let col = { date: -1, store: -1, price: -1, inst: -1 };
                let foundHeader = false;
                cardData = [];

                for (let i = 0; i < rows.length; i++) {
                    try { // 개별 행 에러 방어
                        const r = rows[i];
                        if (!foundHeader) {
                            const rowStr = r.join('');
                            if (rowStr.includes('이용일')) {
                                r.forEach((c, idx) => {
                                    if (c === '이용일') col.date = idx;
                                    if (c === '이용가맹점') col.store = idx;
                                    if (c === '이용금액' || c === '결제원금') col.price = idx;
                                    if (c === '할부/회차') col.inst = idx;
                                });
                                foundHeader = true;
                            }
                            continue;
                        }

                        const store = String(r[col.store] || '').trim();
                        // 필터링: 합계나 공백 제외
                        if (!store || store === "" || store.includes('합계') || store.includes('상세내역')) continue;

                        let p = r[col.price];
                        let price = 0;
                        if (typeof p === 'string') {
                            price = parseInt(p.replace(/[^0-9]/g, '')) || 0;
                        } else {
                            price = parseInt(p) || 0;
                        }

                        if (price > 0) {
                            cardData.push({
                                date: String(r[col.date] || '').trim(),
                                store: store,
                                price: price,
                                inst: String(r[col.inst] || '-').trim(),
                                category: '기타/미분류'
                            });
                        }
                    } catch (e) {
                        console.error("행 처리 중 오류 스킵:", i);
                        continue; // 에러 나도 다음 줄로 무조건 진행
                    }
                }
                updateDashboard();
                renderTable();
                document.getElementById('status').textContent = `✅ 분석 완료: 총 ${cardData.length}건`;
            } catch (err) { alert("파일 처리 실패: " + err.message); }
        };
        reader.readAsArrayBuffer(file);
    };

    function updateDashboard() {
        const sumMap = {};
        fixedCosts.forEach(item => sumMap['고정지출'] = (sumMap['고정지출'] || 0) + item.amount);
        cardData.forEach(item => sumMap[item.category] = (sumMap[item.category] || 0) + item.price);

        const labels = Object.keys(sumMap).sort((a,b) => sumMap[b] - sumMap[a]);
        const data = labels.map(l => sumMap[l]);
        
        if(pieChart) pieChart.destroy();
        if(barChart) barChart.destroy();
        
        const colors = ['#0070f3', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796'];
        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: colors }] },
            options: { maintainAspectRatio: false }
        });
        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar', data: { labels, datasets: [{ label:'금액', data, backgroundColor: '#0070f3' }] },
            options: { indexAxis: 'y', maintainAspectRatio: false }
        });
    }

    function renderTable() {
        if(!cardData.length) return;
        let html = '<table><tr><th>카테고리</th><th>이용일</th><th>가맹점</th><th>할부</th><th>금액</th></tr>';
        cardData.forEach((row, idx) => {
            html += `<tr>
                <td><select onchange="updateRowCategory(${idx}, this.value)">
                    ${categories.map(cat => `<option value="${cat}" ${row.category === cat ? 'selected' : ''}>${cat}</option>`).join('')}
                </select></td>
                <td>${row.date}</td><td>${row.store}</td><td>${row.inst}</td>
                <td>${row.price.toLocaleString()}원</td>
            </tr>`;
        });
        document.getElementById('tableOutput').innerHTML = html + '</table>';
    }

    window.updateRowCategory = function(idx, newCat) {
        cardData[idx].category = newCat;
        updateDashboard();
    };

    window.addFixedCost = function() {
        const name = document.getElementById('fixedName').value;
        const amount = parseInt(document.getElementById('fixedAmount').value);
        if (name && amount) {
            fixedCosts.push({ name, amount });
            localStorage.setItem('fixedCosts', JSON.stringify(fixedCosts));
            renderFixedCosts();
            updateDashboard();
            document.getElementById('fixedName').value = '';
            document.getElementById('fixedAmount').value = '';
        }
    };

    window.removeFixed = function(i) {
        fixedCosts.splice(i, 1);
        localStorage.setItem('fixedCosts', JSON.stringify(fixedCosts));
        renderFixedCosts();
        updateDashboard();
    };

    function renderFixedCosts() {
        const div = document.getElementById('fixedList');
        div.innerHTML = fixedCosts.map((item, i) => `
            <span class="fixed-tag">${item.name}: ${item.amount.toLocaleString()}원 
            <b onclick="removeFixed(${i})" style="color:red; cursor:pointer; margin-left:5px">×</b></span>
        `).join('') || "<p style='color:#999'>고정 지출을 등록해 보세요.</p>";
    }

    window.saveCurrentMonth = function() {
        const month = document.getElementById('saveMonth').value.trim();
        if (!month || cardData.length === 0) return alert("저장할 이름을 입력하고 엑셀을 업로드해 주세요.");
        archives[month] = cardData;
        localStorage.setItem('monthlyArchives', JSON.stringify(archives));
        renderArchiveList();
        alert(month + " 저장 완료!");
    };

    function renderArchiveList() {
        const div = document.getElementById('archiveList');
        div.innerHTML = Object.keys(archives).map(m => `
            <button onclick="loadMonth('${m}')" style="padding:5px 12px; border-radius:15px; border:1px solid #0070f3; background:white; color:#0070f3; cursor:pointer;">🗓️ ${m}</button>
        `).join('') || "";
    }

    window.loadMonth = function(m) {
        cardData = archives[m];
        updateDashboard();
        renderTable();
        document.getElementById('saveMonth').value = m;
    };
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님 가계부 - 디버깅 모드</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #f4f7f6; }
        body { font-family: sans-serif; padding: 20px; background: var(--bg); max-width: 1300px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .upload-area { display: block; border: 2px dashed var(--primary); padding: 30px; text-align: center; cursor: pointer; background: #f0f7ff; border-radius: 15px; margin: 20px 0; }
        #excelInput { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>
<div class="box">
    <h1 style="text-align:center; color:var(--primary);">📊 지출 분석 (강제 스캔 모드)</h1>
    <div id="archiveList" style="text-align:center; margin-bottom:20px;"></div>
    <label class="upload-area" for="excelInput">
        <strong>이곳을 클릭하여 엑셀 업로드</strong>
        <p id="status">파일을 선택하세요.</p>
        <input type="file" id="excelInput" accept=".xls, .xlsx">
    </label>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; height:350px;">
        <canvas id="pieChart"></canvas><canvas id="barChart"></canvas>
    </div>
    <div id="tableOutput"></div>
</div>

<script>
window.onload = function() {
    let cardData = [];
    let pieChart, barChart;

    document.getElementById('excelInput').onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            
            console.log("엑셀 전체 행 개수:", rows.length); // 디버깅용

            let col = { date: -1, store: -1, price: -1, inst: -1 };
            let foundHeader = false;
            cardData = [];

            for (let i = 0; i < rows.length; i++) {
                const r = rows[i];
                if (!foundHeader) {
                    if (r.join('').includes('이용일')) {
                        r.forEach((c, idx) => {
                            if (c === '이용일') col.date = idx;
                            if (c === '이용가맹점') col.store = idx;
                            if (c === '이용금액' || c === '결제원금') col.price = idx;
                            if (c === '할부/회차') col.inst = idx;
                        });
                        foundHeader = true;
                        console.log("헤더 찾음! 위치:", i, col);
                    }
                    continue;
                }

                const store = String(r[col.store] || '').trim();
                if (!store || store.includes('합계') || store.includes('상세내역')) continue;

                let p = r[col.price];
                let price = (typeof p === 'string') ? parseInt(p.replace(/[^0-9]/g, '')) : parseInt(p);

                if (price > 0) {
                    cardData.push({
                        date: String(r[col.date] || ''),
                        store: store,
                        price: price,
                        inst: String(r[col.inst] || '-'),
                        category: '기타/미분류'
                    });
                }
            }
            console.log("추출된 데이터 개수:", cardData.length);
            renderAll();
        };
        reader.readAsArrayBuffer(file);
    };

    function renderAll() {
        document.getElementById('status').textContent = "✅ 성공: " + cardData.length + "건";
        // 그래프 갱신
        const sumMap = {};
        cardData.forEach(d => sumMap[d.category] = (sumMap[d.category] || 0) + d.price);
        const labels = Object.keys(sumMap);
        const data = labels.map(l => sumMap[l]);

        if(pieChart) pieChart.destroy();
        pieChart = new Chart(document.getElementById('pieChart'), { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: ['#0070f3', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b'] }] }});
        
        // 테이블 갱신
        let html = '<table><tr><th>카테고리</th><th>이용일</th><th>가맹점</th><th>할부</th><th>금액</th></tr>';
        cardData.forEach(row => {
            html += `<tr><td>${row.category}</td><td>${row.date}</td><td>${row.store}</td><td>${row.inst}</td><td>${row.price.toLocaleString()}원</td></tr>`;
        });
        document.getElementById('tableOutput').innerHTML = html + '</table>';
    }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성빈님의 데이터 가계부 Pro</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-color: #0070f3; --bg-color: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; color: #333; max-width: 1200px; margin: 0 auto; background-color: var(--bg-color); }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: var(--primary-color); text-align: center; margin-bottom: 30px; }
        .section { margin-bottom: 30px; padding: 20px; background: #fff; border: 1px solid #eee; border-radius: 15px; }
        
        /* 대시보드 레이아웃 */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
        
        .chart-box { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #f0f0f0; height: 400px; }
        
        /* 입력 폼 및 버튼 */
        .fixed-cost-input { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .custom-button { background: var(--primary-color); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        .custom-button:hover { opacity: 0.8; }
        
        .upload-section { border: 2px dashed var(--primary-color); padding: 30px; text-align: center; border-radius: 15px; margin: 20px 0; background: #f0f7ff; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; font-size: 13px; }
        th { background-color: var(--primary-color); color: white; padding: 12px; }
        td { border: 1px solid #eee; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 가계부 분석 대시보드</h1>
    
    <div class="section">
        <h3 style="margin-top:0">🏠 고정 지출 등록</h3>
        <div class="fixed-cost-input">
            <input type="text" id="costName" placeholder="항목 (예: 통신비)">
            <input type="number" id="costAmount" placeholder="금액 (원)">
            <button class="custom-button" onclick="addFixedCost()">추가</button>
        </div>
        <div id="fixedCostList"></div>
    </div>

    <div class="upload-section">
        <label for="excelInput" class="custom-button">현대카드 엑셀 업로드</label>
        <input type="file" id="excelInput" accept=".xls, .xlsx" />
        <p id="status" style="margin-top:10px; font-size:14px; color:#555;">파일을 선택하면 통계가 자동 업데이트됩니다.</p>
    </div>

    <div class="dashboard-grid">
        <div class="chart-box">
            <canvas id="pieChart"></canvas>
        </div>
        <div class="chart-box">
            <canvas id="barChart"></canvas>
        </div>
    </div>

    <div id="output"></div>
</div>

<script>
    let fixedCosts = JSON.parse(localStorage.getItem('fixedCosts')) || [];
    let cardData = []; 
    let pieChartObj = null;
    let barChartObj = null;

    displayFixedCosts();

    function addFixedCost() {
        const name = document.getElementById('costName').value;
        const amount = parseInt(document.getElementById('costAmount').value);
        if (name && amount) {
            fixedCosts.push({ name, amount });
            localStorage.setItem('fixedCosts', JSON.stringify(fixedCosts));
            displayFixedCosts();
            updateDashboard();
            document.getElementById('costName').value = '';
            document.getElementById('costAmount').value = '';
        }
    }

    function deleteFixedCost(index) {
        fixedCosts.splice(index, 1);
        localStorage.setItem('fixedCosts', JSON.stringify(fixedCosts));
        displayFixedCosts();
        updateDashboard();
    }

    function displayFixedCosts() {
        const listDiv = document.getElementById('fixedCostList');
        let html = "<div style='display:flex; flex-wrap:wrap; gap:10px; justify-content:center;'>";
        fixedCosts.forEach((item, index) => {
            html += `<span style='background:#e1efff; padding:5px 10px; border-radius:20px; font-size:13px;'>
                        ${item.name}: ${item.amount.toLocaleString()}원 
                        <button onclick="deleteFixedCost(${index})" style='border:none; background:none; color:red; cursor:pointer; font-weight:bold;'>×</button>
                     </span>`;
        });
        html += "</div>";
        listDiv.innerHTML = fixedCosts.length ? html : "<p style='text-align:center; color:#999;'>등록된 고정 지출이 없습니다.</p>";
    }

    document.getElementById('excelInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            let headerRowIndex = -1;
            for (let i = 0; i < rawData.length; i++) {
                if (rawData[i].join('').includes('이용일')) { headerRowIndex = i; break; }
            }
            cardData = XLSX.utils.sheet_to_json(worksheet, { range: headerRowIndex });
            updateDashboard();
            renderTable(cardData);
        };
        reader.readAsArrayBuffer(file);
    });

    function updateDashboard() {
        const categoryMap = {};
        fixedCosts.forEach(item => categoryMap[item.name] = (categoryMap[item.name] || 0) + item.amount);
        cardData.forEach(row => {
            const category = row['업종'] || '기타';
            let amount = parseInt(String(row['이용금액'] || 0).replace(/,/g, ''));
            categoryMap[category] = (categoryMap[category] || 0) + amount;
        });

        const sortedLabels = Object.keys(categoryMap).sort((a, b) => categoryMap[b] - categoryMap[a]);
        const sortedValues = sortedLabels.map(label => categoryMap[label]);

        drawPieChart(sortedLabels, sortedValues);
        drawBarChart(sortedLabels, sortedValues);
    }

    function drawPieChart(labels, data) {
        const ctx = document.getElementById('pieChart').getContext('2d');
        if (pieChartObj) pieChartObj.destroy();
        pieChartObj = new Chart(ctx, {
            type: 'doughnut',
            data: { labels, datasets: [{ data, backgroundColor: generateColors(labels.length) }] },
            options: { plugins: { title: { display: true, text: '지출 비율 (%)' } }, maintainAspectRatio: false }
        });
    }

    function drawBarChart(labels, data) {
        const ctx = document.getElementById('barChart').getContext('2d');
        if (barChartObj) barChartObj.destroy();
        barChartObj = new Chart(ctx, {
            type: 'bar',
            data: { labels, datasets: [{ label: '지출 금액(원)', data, backgroundColor: '#0070f3' }] },
            options: { 
                indexAxis: 'y', // 가로 막대 그래프
                plugins: { title: { display: true, text: '항목별 지출 순위' } },
                maintainAspectRatio: false 
            }
        });
    }

    function generateColors(len) {
        const colors = ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796', '#5a5c69', '#f8f9fc'];
        return Array.from({length: len}, (_, i) => colors[i % colors.length]);
    }

    function renderTable(data) {
        const output = document.getElementById('output');
        if (!data.length) return;
        const headers = Object.keys(data[0]);
        let html = '<table><thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
        data.forEach(row => html += '<tr>' + headers.map(h => `<td>${row[h] || ''}</td>`).join('') + '</tr>');
        output.innerHTML = html + '</tbody></table>';
    }
</script>
</body>
</html>

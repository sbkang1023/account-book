<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님의 스마트 가계부 - 카테고리 완결판</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #f0f2f5; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: var(--bg); max-width: 1200px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h3 { color: var(--primary); text-align: center; }
        .upload-area { display: block; border: 2px dashed var(--primary); padding: 30px; text-align: center; cursor: pointer; background: #f0f7ff; border-radius: 15px; margin: 20px 0; }
        #excelInput { display: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
        .chart-container { background: #fff; border: 1px solid #eee; border-radius: 12px; height: 380px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        .cat-tag { background: #e1efff; color: #0070f3; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h1>📊 지출 분석 대시보드</h1>
    
    <label class="upload-area" for="excelInput">
        <strong>여기를 클릭하여 현대카드 엑셀 업로드</strong>
        <p id="status" style="margin-top:10px; color:#666;">카테고리 분류 로그가 하단 테이블에 표시됩니다.</p>
        <input type="file" id="excelInput" accept=".xls, .xlsx">
    </label>

    <div class="dashboard">
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>

    <div id="tableOutput" style="overflow-x:auto"></div>
</div>

<script>
window.onload = function() {
    let cardData = [];
    let pieChart, barChart;

    // 성빈님 내역 맞춤 키워드 (이미지 기반)
    const categoryRules = {
        '차량/주유': ['주유', '충전', '주차', 'IC', '공영', '세차', '하이패스', '모빌리티'],
        '식비/카페': ['식당', '푸드', '커피', '카페', '베이커리', '김밥', '치킨', '밥', '스타벅스', '요리', '도시락', '음식점'],
        '쇼핑/마트': ['네이버페이', '쿠팡', '마트', '편의점', 'GS25', 'CU', '올리브영', '다이소', '배달의민족', 'KCP', 'Apple', '결제'],
        '의료/보험': ['병원', '약국', '치과', '의원', '내과', '의료', '보험', '플란트'],
        '통신/주거': ['핸드폰', '휴대폰', '통신', 'SKT', 'KT', 'LG', '관리비', '전기', '가스']
    };

    document.getElementById('excelInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
            
            let headerIdx = -1;
            for(let i=0; i<rows.length; i++) {
                if(rows[i].join('').includes('이용일')) { headerIdx = i; break; }
            }
            cardData = XLSX.utils.sheet_to_json(sheet, {range: headerIdx});
            updateDashboard();
        };
        reader.readAsArrayBuffer(file);
    };

    function updateDashboard() {
        const sumMap = {};
        const processedData = [];

        cardData.forEach(row => {
            // 1. 가맹점명 정제 (숫자, 콤마, 특수기호 제거)
            let storeRaw = String(row['이용가맹점'] || row['가맹점명'] || '미분류');
            let storeClean = storeRaw.replace(/[0-9,\.]/g, '').trim(); 
            
            // 2. 금액 정제
            let priceRaw = row['이용금액'] || row['결제원금'] || 0;
            let price = (typeof priceRaw === 'string') ? parseInt(priceRaw.replace(/[^0-9]/g, '')) || 0 : parseInt(priceRaw) || 0;
            
            if (price > 0) {
                let category = '기타/미분류';
                for (const [cat, keywords] of Object.entries(categoryRules)) {
                    if (keywords.some(k => storeClean.includes(k))) {
                        category = cat;
                        break;
                    }
                }
                sumMap[category] = (sumMap[category] || 0) + price;
                
                // 테이블용 데이터 저장
                row['분류결과'] = category;
                processedData.push(row);
            }
        });

        const labels = Object.keys(sumMap).sort((a,b) => sumMap[b] - sumMap[a]);
        const values = labels.map(l => sumMap[l]);
        
        drawCharts(labels, values);
        renderTable(processedData);
    }

    function drawCharts(labels, data) {
        if(pieChart) pieChart.destroy();
        if(barChart) barChart.destroy();
        const colors = ['#0070f3', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796', '#ff9f40'];
        
        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { labels, datasets: [{ data, backgroundColor: colors }] },
            options: { maintainAspectRatio: false }
        });

        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels, datasets: [{ label:'금액(원)', data, backgroundColor: '#0070f3' }] },
            options: { indexAxis: 'y', maintainAspectRatio: false }
        });
    }

    function renderTable(data) {
        if(!data.length) return;
        const keys = Object.keys(data[0]);
        // '분류결과'를 맨 앞으로 보낸 테이블 헤더
        let html = '<table><tr><th>분류결과</th>' + keys.filter(k => k !== '분류결과').map(k => `<th>${k}</th>`).join('') + '</tr>';
        data.forEach(row => {
            html += `<tr><td><span class="cat-tag">${row['분류결과']}</span></td>`;
            html += keys.filter(k => k !== '분류결과').map(k => `<td>${row[k] || ''}</td>`).join('') + '</tr>';
        });
        document.getElementById('tableOutput').innerHTML = html + '</table>';
    }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성빈님의 통합 지출 관리 시스템</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #f0f2f5; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: var(--bg); max-width: 1100px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h3 { color: var(--primary); text-align: center; }
        
        /* 고정 지출 섹션 */
        .input-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* 업로드 섹션 */
        .upload-area { display: block; border: 2px dashed var(--primary); padding: 30px; text-align: center; cursor: pointer; background: #f0f7ff; border-radius: 15px; margin: 20px 0; }
        #excelInput { display: none; }

        /* 대시보드 그래프 */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
        .chart-container { background: #fff; border: 1px solid #eee; border-radius: 12px; height: 350px; padding: 10px; }

        /* 상세 테이블 */
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="box">
    <h1>📊 가계부 통합 분석기</h1>
    
    <div class="section">
        <h3>🏠 고정 지출 등록 (보험/통신 등)</h3>
        <div class="input-group">
            <input type="text" id="fixedName" placeholder="항목 이름">
            <input type="number" id="fixedAmount" placeholder="금액 (원)">
            <button class="btn" id="addBtn">추가하기</button>
        </div>
        <div id="fixedList" style="text-align:center; margin-bottom:20px;"></div>
    </div>

    <label class="upload-area" for="excelInput">
        <strong style="font-size: 1.1em; cursor: pointer;">이곳을 클릭하여 현대카드 엑셀 업로드</strong>
        <p id="status" style="margin-top:10px; color:#666;">파일을 선택하면 자동으로 분석됩니다.</p>
        <input type="file" id="excelInput" accept=".xls, .xlsx">
    </label>

    <div class="dashboard">
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>

    <div class="table-wrap" id="tableOutput"></div>
</div>

<script>
window.onload = function() {
    let fixedCosts = JSON.parse(localStorage.getItem('fixedCosts')) || [];
    let cardData = [];
    let pieChart, barChart;

    // 분류 규칙
    const categoryRules = {
        '교통/주유': ['주유', '충전', '주차', '하이패스', '철도', '택시', 'IC'],
        '식비': ['식당', '푸드', '커피', '카페', '스타벅스', '음식점', '베이커리'],
        '쇼핑': ['네이버페이', '쿠팡', '마트', '백화점', '편의점', '올리브영'],
        '주거/통신': ['통신', 'SKT', 'KT', 'LG', '관리비', '전기'],
        '의료/보험': ['병원', '약국', '의원', '치과', '보험']
    };

    renderFixedCosts();
    updateDashboard();

    // 고정 지출 추가 버튼 이벤트
    document.getElementById('addBtn').onclick = function() {
        const name = document.getElementById('fixedName').value;
        const amount = parseInt(document.getElementById('fixedAmount').value);
        if (name && amount) {
            fixedCosts.push({ name, amount });
            localStorage.setItem('fixedCosts', JSON.stringify(fixedCosts));
            renderFixedCosts();
            updateDashboard();
            document.getElementById('fixedName').value = '';
            document.getElementById('fixedAmount').value = '';
        }
    };

    // 엑셀 파일 선택 시 실행되는 로직
    document.getElementById('excelInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                
                let headerIdx = -1;
                for(let i=0; i<rows.length; i++) {
                    if(rows[i].join('').includes('이용일')) { headerIdx = i; break; }
                }

                if(headerIdx === -1) {
                    alert("'이용일' 열을 찾지 못했습니다. 현대카드 엑셀이 맞는지 확인해주세요.");
                    return;
                }

                cardData = XLSX.utils.sheet_to_json(sheet, {range: headerIdx});
                updateDashboard();
                renderTable(cardData);
                document.getElementById('status').textContent = `✅ 분석 완료 (${cardData.length}건)`;
            } catch (err) {
                alert("파일 읽기 오류: " + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
    };

    function updateDashboard() {
        const sumMap = {};
        // 1. 고정 지출 먼저 반영
        fixedCosts.forEach(item => sumMap[item.name] = (sumMap[item.name] || 0) + item.amount);
        
        // 2. 카드 지출 키워드 분류 합산
        cardData.forEach(row => {
            const store = row['이용가맹점'] || row['가맹점명'] || '기타';
            let priceRaw = row['이용금액'] || row['결제원금'] || 0;
            let price = (typeof priceRaw === 'string') ? parseInt(priceRaw.replace(/[^0-9]/g, '')) || 0 : parseInt(priceRaw) || 0;
            
            if (price > 0) {
                let category = '기타/미분류';
                for (const [cat, keywords] of Object.entries(categoryRules)) {
                    if (keywords.some(k => store.includes(k))) { category = cat; break; }
                }
                sumMap[category] = (sumMap[category] || 0) + price;
            }
        });

        const labels = Object.keys(sumMap).sort((a,b) => sumMap[b] - sumMap[a]);
        const values = labels.map(l => sumMap[l]);
        
        drawCharts(labels, values);
    }

    function drawCharts(labels, data) {
        const pieCtx = document.getElementById('pieChart').getContext('2d');
        const barCtx = document.getElementById('barChart').getContext('2d');
        if(pieChart) pieChart.destroy();
        if(barChart) barChart.destroy();
        
        const colors = ['#0070f3', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796'];
        
        pieChart = new Chart(pieCtx, {
            type: 'doughnut',
            data: { labels, datasets: [{ data, backgroundColor: colors }] },
            options: { maintainAspectRatio: false, plugins: { title: { display: true, text: '지출 비중 (%)' } } }
        });

        barChart = new Chart(barCtx, {
            type: 'bar',
            data: { labels, datasets: [{ label:'금액(원)', data, backgroundColor: '#0070f3' }] },
            options: { indexAxis: 'y', maintainAspectRatio: false, scales: { x: { ticks: { callback: v => v.toLocaleString() } } } }
        });
    }

    function renderFixedCosts() {
        const div = document.getElementById('fixedList');
        div.innerHTML = fixedCosts.map((item, i) => `
            <span style="background:#eef; padding:5px 10px; border-radius:15px; margin:5px; display:inline-block; font-size:13px;">
                ${item.name}: ${item.amount.toLocaleString()}원 
                <b onclick="removeFixed(${i})" style="color:red; cursor:pointer; margin-left:5px">×</b>
            </span>
        `).join('') || "<p style='color:#999'>고정 지출을 등록해 보세요.</p>";
    }

    window.removeFixed = function(i) {
        fixedCosts.splice(i, 1);
        localStorage.setItem('fixedCosts', JSON.stringify(fixedCosts));
        renderFixedCosts();
        updateDashboard();
    };

    function renderTable(data) {
        if(!data.length) return;
        const keys = Object.keys(data[0]);
        let html = '<table><tr>' + keys.map(k => `<th>${k}</th>`).join('') + '</tr>';
        data.forEach(row => html += '<tr>' + keys.map(k => `<td>${row[k] || ''}</td>`).join('') + '</tr>');
        document.getElementById('tableOutput').innerHTML = html + '</table>';
    }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님의 스마트 가계부 - 데이터 정제 버전</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: var(--bg); max-width: 1200px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h3 { color: var(--primary); text-align: center; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { opacity: 0.8; }
        .btn-save { background: #28a745; margin-left: 10px; }
        .upload-area { display: block; border: 2px dashed var(--primary); padding: 20px; text-align: center; cursor: pointer; background: #f0f7ff; border-radius: 15px; margin: 20px 0; }
        #excelInput { display: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #eee; border-radius: 12px; height: 350px; padding: 10px; }
        .archive-list { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .archive-item { background: #fff; border: 1px solid var(--primary); color: var(--primary); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        select { padding: 4px; border-radius: 4px; border: 1px solid #ddd; width: 100%; }
        .fixed-tag { background: #eef; padding: 5px 10px; border-radius: 15px; margin: 5px; display: inline-block; font-size: 13px; }
    </style>
</head>
<body>

<div class="box">
    <h1>📊 지출 분석 시스템 (합계 행 예외처리)</h1>
    
    <div class="section">
        <h3>📂 저장된 데이터 기록</h3>
        <div id="archiveList" class="archive-list"></div>
    </div>

    <div class="section" style="border-top: 1px solid #eee; padding-top: 20px;">
        <h3>🏠 데이터 관리</h3>
        <div style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;">
            <input type="text" id="fixedName" placeholder="고정항목" style="padding:8px; border-radius:8px; border:1px solid #ddd;">
            <input type="number" id="fixedAmount" placeholder="금액" style="padding:8px; border-radius:8px; border:1px solid #ddd;">
            <button onclick="addFixedCost()" class="btn">고정지출 추가</button>
            <input type="text" id="saveMonth" placeholder="예: 2024년 4월" style="padding:8px; border-radius:8px; border:1px solid #ddd; margin-left: 20px;">
            <button onclick="saveCurrentMonth()" class="btn btn-save">저장하기</button>
        </div>
        <div id="fixedList" style="text-align:center;"></div>
    </div>

    <label class="upload-area" for="excelInput">
        <strong>새로운 엑셀 업로드</strong>
        <input type="file" id="excelInput" accept=".xls, .xlsx">
    </label>

    <div class="dashboard">
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>

    <div id="tableOutput" style="overflow-x:auto; max-height: 400px;"></div>
</div>

<script>
window.onload = function() {
    let fixedCosts = JSON.parse(localStorage.getItem('fixedCosts')) || [];
    let archives = JSON.parse(localStorage.getItem('monthlyArchives')) || {};
    let cardData = [];
    let pieChart, barChart;

    const categories = ['식비/카페', '차량/주유', '쇼핑/마트', '의료/건강', '통신/주거', '기타/미분류'];

    renderFixedCosts();
    renderArchiveList();
    updateDashboard();

    window.saveCurrentMonth = function() {
        const monthName = document.getElementById('saveMonth').value.trim();
        if (!monthName) return alert("저장할 이름을 입력하세요!");
        archives[monthName] = cardData;
        localStorage.setItem('monthlyArchives', JSON.stringify(archives));
        renderArchiveList();
        alert(monthName + " 저장 완료!");
    };

    function renderArchiveList() {
        const listDiv = document.getElementById('archiveList');
        listDiv.innerHTML = Object.keys(archives).map(month => `
            <div class="archive-item" onclick="loadMonth('${month}')">🗓️ ${month}</div>
        `).join('') || "<p style='color:#999'>기록 없음</p>";
    }

    window.loadMonth = function(month) {
        if (confirm(month + " 데이터를 불러옵니까?")) {
            cardData = archives[month];
            updateDashboard();
            renderTable();
            document.getElementById('saveMonth').value = month;
        }
    };

    window.addFixedCost = function() {
        const name = document.getElementById('fixedName').value;
        const amount = parseInt(document.getElementById('fixedAmount').value);
        if (name && amount) {
            fixedCosts.push({ name, amount });
            localStorage.setItem('fixedCosts', JSON.stringify(fixedCosts));
            renderFixedCosts();
            updateDashboard();
            document.getElementById('fixedName').value = '';
            document.getElementById('fixedAmount').value = '';
        }
    };

    document.getElementById('excelInput').onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
            
            let headerIdx = -1;
            for(let i=0; i<rows.length; i++) {
                if(rows[i].join('').includes('이용일')) { headerIdx = i; break; }
            }
            
            if(headerIdx !== -1) {
                const rawData = XLSX.utils.sheet_to_json(sheet, {range: headerIdx});
                cardData = [];
                
                rawData.forEach(row => {
                    const rawStore = String(row['이용가맹점'] || row['가맹점명'] || '');
                    
                    // 핵심 수정: '합계'라는 단어가 포함된 행은 데이터에서 제외 (Continue)
                    if (rawStore.includes('합계')) return;

                    const priceRegex = /([0-9,]+)$/; 
                    const match = rawStore.match(priceRegex);
                    
                    let extractedPrice = 0;
                    let cleanStore = rawStore;
                    if (match) {
                        extractedPrice = parseInt(match[1].replace(/,/g, '')) || 0;
                        cleanStore = rawStore.replace(priceRegex, '').trim();
                    } else {
                        let altPrice = row['이용금액'] || row['결제원금'] || 0;
                        extractedPrice = (typeof altPrice === 'string') ? parseInt(altPrice.replace(/[^0-9]/g, '')) || 0 : parseInt(altPrice);
                    }
                    
                    if (extractedPrice > 0) {
                        cardData.push({ 
                            ...row, 
                            __category: '기타/미분류', 
                            __price: extractedPrice, 
                            __store: cleanStore || rawStore
                        });
                    }
                });
                updateDashboard();
                renderTable();
            }
        };
        reader.readAsArrayBuffer(file);
    };

    function updateDashboard() {
        const sumMap = {};
        fixedCosts.forEach(item => {
            sumMap['고정지출'] = (sumMap['고정지출'] || 0) + item.amount;
        });
        cardData.forEach(item => {
            sumMap[item.__category] = (sumMap[item.__category] || 0) + item.__price;
        });

        const labels = Object.keys(sumMap).sort((a,b) => sumMap[b] - sumMap[a]);
        const data = labels.map(l => sumMap[l]);
        
        if(pieChart) pieChart.destroy();
        if(barChart) barChart.destroy();
        
        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { labels, datasets: [{ data, backgroundColor: ['#0070f3', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796'] }] }
        });

        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels, datasets: [{ label:'금액', data, backgroundColor: '#0070f3' }] },
            options: { indexAxis: 'y', maintainAspectRatio: false }
        });
    }

    function renderTable() {
        let html = '<table><tr><th>카테고리</th><th>가맹점</th><th>금액</th></tr>';
        cardData.forEach((row, idx) => {
            html += `<tr>
                <td>
                    <select onchange="updateRowCategory(${idx}, this.value)">
                        ${categories.map(cat => `<option value="${cat}" ${row.__category === cat ? 'selected' : ''}>${cat}</option>`).join('')}
                    </select>
                </td>
                <td>${row.__store}</td>
                <td>${row.__price.toLocaleString()}원</td>
            </tr>`;
        });
        document.getElementById('tableOutput').innerHTML = html + '</table>';
    }

    window.updateRowCategory = function(idx, newCat) {
        cardData[idx].__category = newCat;
        updateDashboard();
    };

    function renderFixedCosts() {
        const div = document.getElementById('fixedList');
        div.innerHTML = fixedCosts.map((item, i) => `
            <span class="fixed-tag">${item.name}: ${item.amount.toLocaleString()}원 
            <b onclick="removeFixed(${i})" style="color:red; cursor:pointer; margin-left:5px">×</b></span>
        `).join('') || "<p>고정 지출 없음</p>";
    }

    window.removeFixed = function(i) {
        fixedCosts.splice(i, 1);
        localStorage.setItem('fixedCosts', JSON.stringify(fixedCosts));
        renderFixedCosts();
        updateDashboard();
    };
};
</script>
</body>
</html>

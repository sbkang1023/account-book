<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님의 가계부 - 금액 정밀 분석판</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: var(--bg); max-width: 1300px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: var(--primary); text-align: center; }
        .upload-area { display: block; border: 2px dashed var(--primary); padding: 40px; text-align: center; cursor: pointer; background: #fff; border-radius: 15px; margin: 20px 0; }
        #excelInput { display: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #eee; border-radius: 12px; height: 350px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; background: #fff; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h1>📊 지출 분석 (금액 정밀 타격 모드)</h1>
    
    <div style="text-align:center; margin-bottom:20px;">
        <input type="text" id="saveMonth" placeholder="예: 2026-04" style="padding:8px; border-radius:8px; border:1px solid #ddd;">
        <button onclick="saveCurrentMonth()" class="btn" style="background:#28a745;">저장</button>
        <div id="archiveList" style="margin-top:10px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;"></div>
    </div>

    <label class="upload-area" for="excelInput">
        <strong>클릭하여 현대카드 엑셀 업로드</strong>
        <p id="status">시스템 숫자를 제외하고 실제 결제 금액만 골라냅니다.</p>
        <input type="file" id="excelInput" accept=".xls, .xlsx">
    </label>

    <div class="dashboard">
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>

    <div id="tableOutput" style="overflow-x:auto; max-height: 500px; border-radius: 10px; border:1px solid #eee;"></div>
</div>

<script>
window.onload = function() {
    let cardData = [];
    let archives = JSON.parse(localStorage.getItem('monthlyArchives')) || {};
    let pieChart;

    renderArchiveList();

    document.getElementById('excelInput').onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array', cellText: true});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rawRows = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                
                cardData = [];
                for (let i = 0; i < rawRows.length; i++) {
                    const row = rawRows[i];
                    const rowStr = row.join('|');
                    const dateMatch = rowStr.match(/\d{4}[\.\s년]\s?\d{2}[\.\s월]\s?\d{2}/);
                    
                    if (dateMatch) {
                        const store = String(row[2] || "").trim();
                        
                        // [정밀 타격] 2,000만 원대 오탐을 피하기 위해 
                        // 1. 가맹점 이름(인덱스 2)에 붙어있는 숫자를 최우선으로 시도
                        // 2. 아니면 엑셀 줄의 뒷부분(결제원금 위치)에서 숫자 추출
                        let price = 0;
                        const storePriceMatch = store.match(/(\d{1,3}(,\d{3})*)$|(\d+)$/);
                        
                        if (storePriceMatch) {
                            price = parseInt(storePriceMatch[0].replace(/,/g, ''));
                        } else {
                            // 가맹점명에 숫자가 없으면 행의 마지막 요소들에서 금액 탐색
                            for(let j = row.length - 1; j >= 0; j--) {
                                const val = String(row[j]).replace(/[^0-9]/g, "");
                                const p = parseInt(val);
                                if (p > 500 && p < 5000000) { // 500만원 이하의 현실적인 금액만 수집
                                    price = p;
                                    break;
                                }
                            }
                        }

                        if (price > 0 && store !== "") {
                            cardData.push({
                                date: dateMatch[0],
                                store: store,
                                price: price
                            });
                        }
                    }
                }

                updateDashboard();
                renderTable();
                document.getElementById('status').textContent = `✅ 성공: 총 ${cardData.length}건 수집 완료!`;
            } catch (err) { alert("분석 실패"); }
        };
        reader.readAsArrayBuffer(file);
    };

    function renderTable() {
        let html = '<table><tr><th>날짜</th><th>가맹점</th><th>금액</th></tr>';
        cardData.forEach(item => {
            html += `<tr><td>${item.date}</td><td>${item.store}</td><td style="font-weight:bold;">${item.price.toLocaleString()}원</td></tr>`;
        });
        document.getElementById('tableOutput').innerHTML = html + '</table>';
    }

    function updateDashboard() {
        const total = cardData.reduce((sum, d) => sum + d.price, 0);
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(document.getElementById('pieChart'), { 
            type: 'doughnut', 
            data: { labels: ['지출합계'], datasets: [{ data: [total], backgroundColor: ['#0070f3'] }] },
            options: { maintainAspectRatio: false }
        });
    }

    window.saveCurrentMonth = function() {
        const m = document.getElementById('saveMonth').value.trim();
        if (m && cardData.length > 0) {
            archives[m] = cardData;
            localStorage.setItem('monthlyArchives', JSON.stringify(archives));
            renderArchiveList();
            alert(m + " 저장됨");
        }
    };

    function renderArchiveList() {
        document.getElementById('archiveList').innerHTML = Object.keys(archives).map(m => 
            `<button onclick="loadMonth('${m}')" style="padding:5px 10px; border-radius:15px; border:1px solid #0070f3; background:white; color:#0070f3; cursor:pointer;">${m}</button>`
        ).join('');
    }

    window.loadMonth = function(m) {
        cardData = archives[m];
        updateDashboard();
        renderTable();
        document.getElementById('saveMonth').value = m;
    };
};
</script>
</body>
</html>

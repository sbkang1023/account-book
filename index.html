<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성빈님의 데이터 가계부 - 최종 디버깅 버전</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #f0f2f5; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: var(--bg); max-width: 1100px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: var(--primary); text-align: center; }
        .upload-area { display: block; border: 2px dashed var(--primary); padding: 30px; text-align: center; cursor: pointer; background: #f0f7ff; border-radius: 15px; margin: 20px 0; }
        #excelInput { display: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #eee; border-radius: 12px; height: 350px; }
        #debug-log { background: #333; color: #0f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; background: white; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="box">
    <h1>📊 지출 분석 시스템 (최종)</h1>
    
    <label class="upload-area" for="excelInput">
        <strong>이곳을 클릭하여 엑셀 업로드</strong>
        <p id="status" style="margin-top:10px; color:blue;">파일을 선택하면 아래 로그에 진행 상황이 뜹니다.</p>
        <input type="file" id="excelInput" accept=".xls, .xlsx">
    </label>

    <div id="debug-log">시스템 준비 완료. 파일을 업로드해 주세요.</div>

    <div class="dashboard">
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>

    <div id="tableOutput"></div>
</div>

<script>
window.onload = function() {
    const log = document.getElementById('debug-log');
    const status = document.getElementById('status');
    let pieChart, barChart;

    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        log.innerHTML += `<br>[${time}] ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

        '식비': ['식당', '푸드', '커피', '카페', '스타벅스', '음식점', '치킨', '피자', '한식', '일식'],
        '쇼핑': ['네이버페이', '쿠팡', '마트', '백화점', '편의점', '올리브영', '다이소'],
        '주거/통신': ['통신', 'SKT', 'KT', 'LG', '관리비', '전기', '수도'],
        '의료/보험': ['병원', '약국', '의원', '치과', '보험']
    };

    document.getElementById('excelInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

                addLog("엑셀 데이터 파싱 중...");

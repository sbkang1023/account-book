<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님의 데이터 가계부 - 리커버리 모드</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #f0f2f5; }
        body { font-family: sans-serif; padding: 20px; background: var(--bg); max-width: 1200px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: var(--primary); text-align: center; }
        .upload-area { display: block; border: 2px dashed var(--primary); padding: 30px; text-align: center; cursor: pointer; background: #f0f7ff; border-radius: 15px; margin: 20px 0; }
        #excelInput { display: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #eee; border-radius: 12px; height: 380px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="box">
    <h1>📊 지출 분석 시스템 (복구됨)</h1>
    
    <label class="upload-area" for="excelInput">
        <strong>여기를 클릭하여 현대카드 엑셀 업로드</strong>
        <p id="status" style="margin-top:10px; color:#666;">데이터가 나오지 않으면 '이용일' 글자가 포함된 엑셀인지 확인해주세요.</p>
        <input type="file" id="excelInput" accept=".xls, .xlsx">
    </label>

    <div class="dashboard">
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>

    <div id="tableOutput"></div>
</div>

<script>
window.onload = function() {
    let pieChart, barChart;

    // 분류 키워드 (가장 흔한 것들만 우선 배치)
    const categoryRules = {
        '차량/주유': ['주유', '충전', '주차', 'IC', '하이패스'],
        '식비/카페': ['식당', '푸드', '커피', '카페', '김밥', '음식점', '스타벅스'],
        '쇼핑/마트': ['네이버', '쿠팡', '마트', '편의점', '올리브영', '배달', 'KCP', 'Apple'],
        '의료/보험': ['병원', '약국', '치과', '의원', '보험'],
        '통신/주거': ['핸드폰', '휴대폰', '통신', '관리비', '전기']
    };

    document.getElementById('excelInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
            
            // 1. 헤더 위치 찾기 (무조건 한 줄씩 검사)
            let headerIdx = -1;
            for(let i=0; i<rows.length; i++) {
                const line = rows[i].join('');
                if(line.includes('이용일')) { headerIdx = i; break; }
            }

            if(headerIdx === -1) {
                alert("엑셀에서 '이용일' 컬럼을 찾지 못했습니다.");
                return;
            }

            // 2. 데이터 가공
            const cardData = XLSX.utils.sheet_to_json(sheet, {range: headerIdx});
            const sumMap = {};

            cardData.forEach(row => {
                const store = String(row['이용가맹점'] || row['가맹점명'] || '');
                let priceRaw = row['이용금액'] || row['결제원금'] || 0;
                let price = (typeof priceRaw === 'string') ? parseInt(priceRaw.replace(/[^0-9]/g, '')) || 0 : parseInt(priceRaw) || 0;

                if (price > 0) {
                    let category = '기타';
                    for (const [cat, keywords] of Object.entries(categoryRules)) {
                        if (keywords.some(k => store.includes(k))) {
                            category = cat;
                            break;
                        }
                    }
                    sumMap[category] = (sumMap[category] || 0) + price;
                    row['__분류'] = category; // 테이블 표시용
                }
            });

            // 3. 시각화
            const labels = Object.keys(sumMap).sort((a,b) => sumMap[b] - sumMap[a]);
            const values = labels.map(l => sumMap[l]);
            
            updateCharts(labels, values);
            renderTable(cardData);
            document.getElementById('status').textContent = `✅ 분석 완료: 총 ${cardData.length}건`;
        };
        reader.readAsArrayBuffer(file);
    };

    function updateCharts(labels, data) {
        if(pieChart) pieChart.destroy();
        if(barChart) barChart.destroy();
        const colors = ['#0070f3', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796'];
        
        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { labels, datasets: [{ data, backgroundColor: colors }] }
        });

        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels, datasets: [{ label:'금액', data, backgroundColor: '#0070f3' }] },
            options: { indexAxis: 'y' }
        });
    }

    function renderTable(data) {
        if(!data.length) return;
        const keys = Object.keys(data[0]);
        let html = '<table><tr>' + keys.map(k => `<th>${k}</th>`).join('') + '</tr>';
        data.forEach(row => {
            html += '<tr>' + keys.map(k => `<td>${row[k] || ''}</td>`).join('') + '</tr>';
        });
        document.getElementById('tableOutput').innerHTML = html + '</table>';
    }
};
</script>
</body>
</html>

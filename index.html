<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님의 최종 가계부</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; }
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; max-width: 1100px; margin: 0 auto; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .upload-area { border: 2px dashed var(--primary); padding: 30px; text-align: center; cursor: pointer; background: #f0f7ff; border-radius: 10px; }
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 400px; }
        @media (max-width: 700px) { .charts { grid-template-columns: 1fr; height: auto; } }
        canvas { max-height: 350px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">📊 지출 분석 시스템</h2>
    
    <div class="upload-area" onclick="document.getElementById('excelInput').click()">
        <strong>현대카드 엑셀 파일을 여기에 업로드하세요</strong>
        <input type="file" id="excelInput" accept=".xls, .xlsx" style="display:none">
        <p id="status" style="margin-top:10px; color:#666;">파일을 선택하면 분석이 시작됩니다.</p>
    </div>

    <div class="charts">
        <div><canvas id="pieChart"></canvas></div>
        <div><canvas id="barChart"></canvas></div>
    </div>

    <div id="tableOutput"></div>
</div>

<script>
    let pieChart, barChart;

    document.getElementById('excelInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            
            // 모든 셀을 문자열로 읽어옵니다.
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
            
            // 1. 헤더(제목줄) 위치 찾기
            let headerIdx = -1;
            for(let i=0; i<rows.length; i++) {
                if(rows[i].join('').includes('이용일')) { headerIdx = i; break; }
            }

            if(headerIdx === -1) {
                alert("'이용일' 칸을 찾을 수 없습니다. 현대카드 엑셀이 맞는지 확인해주세요.");
                return;
            }

            // 2. 데이터 정리
            const cleanData = XLSX.utils.sheet_to_json(sheet, {range: headerIdx});
            const categoryMap = {};

            cleanData.forEach(row => {
                // 후보군을 다 뒤져서 가맹점명 찾기
                const store = row['이용가맹점'] || row['가맹점명'] || row['내용'] || '기타';
                
                // 후보군을 다 뒤져서 금액 찾기 (이미지의 '이용금액' 또는 '결제원금')
                let priceRaw = row['이용금액'] || row['결제원금'] || row['금액'] || 0;
                
                // 숫자만 남기기 (콤마 제거)
                let price = 0;
                if(typeof priceRaw === 'string') {
                    price = parseInt(priceRaw.replace(/[^0-9]/g, '')) || 0;
                } else {
                    price = parseInt(priceRaw) || 0;
                }

                if(price > 0) {
                    categoryMap[store] = (categoryMap[store] || 0) + price;
                }
            });

            // 3. 차트 업데이트
            const labels = Object.keys(categoryMap).sort((a,b) => categoryMap[b] - categoryMap[a]);
            const values = labels.map(l => categoryMap[l]);

            updateCharts(labels, values);
            renderTable(cleanData);
            document.getElementById('status').textContent = `분석 완료: ${labels.length}개 항목 발견`;
        };
        reader.readAsArrayBuffer(file);
    });

    function updateCharts(labels, data) {
        if(pieChart) pieChart.destroy();
        if(barChart) barChart.destroy();

        const colors = ['#0070f3', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#4e73df'];

        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { labels: labels, datasets: [{ data: data, backgroundColor: colors }] },
            options: { plugins: { title: { display:true, text:'지출 비중' } }, maintainAspectRatio: false }
        });

        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels: labels, datasets: [{ label:'금액', data: data, backgroundColor: '#0070f3' }] },
            options: { indexAxis: 'y', maintainAspectRatio: false }
        });
    }

    function renderTable(data) {
        if(!data.length) return;
        const keys = Object.keys(data[0]);
        let html = '<table><tr>' + keys.map(k => `<th>${k}</th>`).join('') + '</tr>';
        data.forEach(row => {
            html += '<tr>' + keys.map(k => `<td>${row[k] || ''}</td>`).join('') + '</tr>';
        });
        document.getElementById('tableOutput').innerHTML = html + '</table>';
    }
</script>
</body>
</html>

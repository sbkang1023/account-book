<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성빈님의 보안 가계부</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary-color: #0070f3; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; line-height: 1.6; color: #333; max-width: 1200px; margin: 0 auto; }
        h1 { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; }
        .upload-section { background: #f8f9fa; border: 2px dashed #ccc; padding: 30px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .custom-button { background: var(--primary-color); color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #excelInput { display: none; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); font-size: 14px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background-color: var(--primary-color); color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        tr:hover { background-color: #f1f7ff; }
        #status { margin-top: 15px; font-weight: bold; color: #0070f3; }
    </style>
</head>
<body>

    <h1>📊 현대카드 지출 내역 분석기</h1>
    <p>보안 안내: 선택하신 엑셀 데이터는 서버로 전송되지 않고 브라우저 메모리 내에서만 처리됩니다.</p>

    <div class="upload-section">
        <label for="excelInput" class="custom-button">현대카드 엑셀 파일 선택</label>
        <input type="file" id="excelInput" accept=".xls, .xlsx" />
        <div id="status">파일을 선택해 주세요.</div>
    </div>

    <div id="output"></div>

    <script>
        const input = document.getElementById('excelInput');
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.textContent = `파일 분석 중...`;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    
                    // 1. 전체 데이터를 배열 형태로 추출
                    const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    // 2. '이용일'이 포함된 진짜 헤더 행 찾기
                    let headerRowIndex = -1;
                    for (let i = 0; i < rawData.length; i++) {
                        if (rawData[i].join('').includes('이용일')) {
                            headerRowIndex = i;
                            break;
                        }
                    }

                    if (headerRowIndex === -1) {
                        status.textContent = "오류: '이용일' 열을 찾을 수 없습니다. 현대카드 정식 명세서 파일이 맞는지 확인해주세요.";
                        return;
                    }

                    // 3. 찾은 행부터 데이터를 다시 JSON으로 변환
                    const cleanData = XLSX.utils.sheet_to_json(worksheet, { range: headerRowIndex });

                    renderTable(cleanData);
                    status.textContent = `분석 완료: 총 ${cleanData.length}건의 내역을 찾았습니다.`;
                } catch (error) {
                    console.error(error);
                    status.textContent = "파일을 읽는 중 오류가 발생했습니다.";
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function renderTable(data) {
            if (data.length === 0) return;
            const headers = Object.keys(data[0]);
            
            let html = '<table><thead><tr>';
            headers.forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';

            data.forEach(row => {
                html += '<tr>';
                headers.forEach(h => html += `<td>${row[h] || ''}</td>`);
                html += '</tr>';
            });
            html += '</tbody></table>';
            output.innerHTML = html;
        }
    </script>
</body>
</html>

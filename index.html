<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성빈님의 가계부 - 트러블슈팅 버전</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0070f3; }
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; max-width: 1100px; margin: 0 auto; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .upload-area { border: 2px dashed var(--primary); padding: 30px; text-align: center; cursor: pointer; background: #f0f7ff; border-radius: 10px; margin-bottom: 20px; }
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; min-height: 350px; }
        .chart-box { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 10px; height: 400px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">📊 가계부 최종 점검 시스템</h2>
    
    <div class="upload-area" id="dropZone">
        <strong>이곳을 클릭하여 현대카드 엑셀 업로드</strong>
        <input type="file" id="excelInput" accept=".xls, .xlsx" style="display:none">
        <p id="status" style="margin-top:10px; color:blue; font-weight:bold;">준비 완료 (파일을 선택해 주세요)</p>
    </div>

    <div class="charts">
        <div class="chart-box"><canvas id="pieChart"></canvas></div>
        <div class="chart-box"><canvas id="barChart"></canvas></div>
    </div>

    <div id="tableOutput" style="overflow-x:auto"></div>
</div>

<script>

        console.log("시스템 시작됨");
        const input = document.getElementById('excelInput');
